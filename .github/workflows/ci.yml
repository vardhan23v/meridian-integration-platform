name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        
    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'pnpm'
        
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      
    - name: Typecheck
      run: pnpm run typecheck
      
    - name: Lint
      run: pnpm run lint
      
    - name: Build Shared
      run: pnpm --filter @meridian/shared run build
      
    - name: Build API
      run: pnpm --filter @meridian/api run build
      
    - name: Build Web
      run: pnpm --filter @meridian/web run build
